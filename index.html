<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amethyst</title>
  <link rel="icon" href="AmethystPNG.png">

  <style>
    :root {
      --bg: #0b0b1a;
      --bg-alt: #141430;
      --accent: #9d4edd;
      --accent-soft: #5a189a;
      --accent-light: #c77dff;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --border: #1f2937;
      --tab-bg: #111827;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: linear-gradient(90deg, #0b0b1a, #1a0f2e);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-right: 12px;
    }

    .logo-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: radial-gradient(circle at 30% 30%, #c77dff, #5a189a);
      box-shadow: 0 0 8px #9d4edd;
    }

    .logo-text {
      font-weight: 600;
      color: var(--accent-light);
    }

    .url-bar {
      flex: 1;
      display: flex;
      gap: 6px;
    }

    .url-input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #0b0b1a;
      color: var(--text);
    }

    .tabs-bar {
      display: flex;
      gap: 6px;
      padding: 6px 10px;
      background: var(--tab-bg);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .btn-secondary {
      padding: 6px 12px;
      border-radius: 999px;
      background: #0b0b1a;
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .tab {
      padding: 4px 10px;
      border-radius: 999px;
      background: #0b0b1a;
      color: var(--text-muted);
      border: 1px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab.active {
      background: var(--accent-soft);
      color: var(--accent-light);
      border-color: var(--accent);
    }

    .content {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: calc(100vh - 80px);
    }

    .sidebar {
      padding: 10px;
      background: var(--bg-alt);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel {
      padding: 10px;
      border-radius: 10px;
      background: #0b0b1a;
      border: 1px solid var(--border);
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-light);
    }

    .tool-btn {
      width: 100%;
      padding: 6px 8px;
      border-radius: 8px;
      background: #0b0b1a;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
    }

    #view-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    #view-div {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 20px;
      display: none;
      background: #0b0b1a;
      color: var(--text);
    }

    .results-title {
      color: var(--accent-light);
      margin-bottom: 10px;
      font-size: 18px;
      font-weight: 600;
    }

    .result-card {
      background: #141430;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px;
      margin-bottom: 10px;
    }

    .result-card a {
      color: var(--accent-light);
      font-weight: 600;
      text-decoration: none;
    }

    .result-card p {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .info-card {
      background: #141430;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <div class="logo">
        <div class="logo-icon"></div>
        <div class="logo-text">Amethyst</div>
      </div>

      <div class="url-bar">
        <input id="url" class="url-input" placeholder="Search or enter URL">
      </div>
    </div>

    <div class="tabs-bar" id="tabs">
      <button class="btn-secondary" onclick="newTab()">+ New Tab</button>
    </div>

    <div class="content">
      <div class="sidebar">
        <div class="panel">
          <div class="panel-title">Tools</div>
          <button class="tool-btn" onclick="saveNote()">Save Note</button>
          <button class="tool-btn" onclick="openWeather()">Weather</button>
          <button class="tool-btn" onclick="openSystem()">System Info</button>
        </div>
      </div>

      <iframe id="view-frame"></iframe>
      <div id="view-div"></div>
    </div>

  </div>

  <script>
    const API_BASE = "https://amethyst-yuxd.onrender.com";

    const tabsEl = document.getElementById("tabs");
    const viewFrame = document.getElementById("view-frame");
    const viewDiv = document.getElementById("view-div");
    const urlEl = document.getElementById("url");

    let tabs = [];
    let activeTab = null;

    function showFrame(url) {
      viewDiv.style.display = "none";
      viewFrame.style.display = "block";
      viewFrame.src = url;
    }

    function showDiv() {
      viewFrame.style.display = "none";
      viewDiv.style.display = "block";
    }

    function setActiveTab(tabId) {
      activeTab = tabId;
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.toggle("active", t.dataset.id === tabId);
      });

      const tab = tabs.find(t => t.id === tabId);
      if (!tab) return;

      if (tab.mode === "external") {
        showFrame(tab.url);
        urlEl.value = tab.url === "about:blank" ? "" : tab.url;
      } else if (tab.mode === "search") {
        renderSearch(tab.query);
        urlEl.value = tab.query;
      } else if (tab.mode === "weather") {
        renderWeather();
        urlEl.value = "";
      } else if (tab.mode === "system") {
        renderSystem();
        urlEl.value = "";
      }
    }

    function closeTab(tabId) {
      const index = tabs.findIndex(t => t.id === tabId);
      if (index === -1) return;

      const tabBtn = document.querySelector(`.tab[data-id="${tabId}"]`);
      tabBtn.remove();

      tabs.splice(index, 1);

      if (activeTab === tabId) {
        if (tabs.length > 0) {
          setActiveTab(tabs[0].id);
        } else {
          viewFrame.style.display = "none";
          viewDiv.style.display = "none";
          activeTab = null;
        }
      }
    }

    function newTab() {
      const id = Math.random().toString(36).slice(2);

      const tab = {
        id,
        mode: "external",
        url: "about:blank",
        query: ""
      };

      tabs.push(tab);

      const tabBtn = document.createElement("div");
      tabBtn.className = "tab";
      tabBtn.dataset.id = id;

      tabBtn.innerHTML = `
        <span>New Tab</span>
        <span onclick="event.stopPropagation(); closeTab('${id}')" style="cursor:pointer;">✕</span>
      `;

      tabBtn.onclick = () => setActiveTab(id);

      tabsEl.insertBefore(tabBtn, tabsEl.firstElementChild);

      setActiveTab(id);
    }

    function openWeather() {
      if (!activeTab) newTab();

      const tab = tabs.find(t => t.id === activeTab);
      tab.mode = "weather";

      const tabBtn = document.querySelector(`.tab[data-id="${activeTab}"] span:first-child`);
      tabBtn.textContent = "Weather";

      renderWeather();
    }

    async function renderWeather() {
      showDiv();
      viewDiv.innerHTML = `<div class="results-title">Weather</div><div>Loading…</div>`;

      try {
        const res = await fetch(`${API_BASE}/weather`);
        const html = await res.text();

        const temp = html.match(/Temperature:<\/strong>\s*([^<]+)/)?.[1] || "N/A";
        const wind = html.match(/Wind Speed:<\/strong>\s*([^<]+)/)?.[1] || "N/A";
        const code = html.match(/Weather Code:<\/strong>\s*([^<]+)/)?.[1] || "N/A";

        viewDiv.innerHTML = `
          <div class="results-title">Weather — Opononi</div>
          <div class="info-card">
            <p><strong>Temperature:</strong> ${temp}</p>
            <p><strong>Wind Speed:</strong> ${wind}</p>
            <p><strong>Weather Code:</strong> ${code}</p>
          </div>
        `;
      } catch {
        viewDiv.innerHTML = `<div class="results-title">Weather</div><div>Failed to load.</div>`;
      }
    }

    function openSystem() {
      if (!activeTab) newTab();

      const tab = tabs.find(t => t.id === activeTab);
      tab.mode = "system";

      const tabBtn = document.querySelector(`.tab[data-id="${activeTab}"] span:first-child`);
      tabBtn.textContent = "System Info";

      renderSystem();
    }

    async function renderSystem() {
      showDiv();
      viewDiv.innerHTML = `<div class="results-title">System Info</div><div>Loading…</div>`;

      try {
        const res = await fetch(`${API_BASE}/system`);
        const html = await res.text();

        const cpu = html.match(/CPU Usage:<\/strong>\s*([^<]+)/)?.[1] || "N/A";
        const ram = html.match(/RAM Usage:<\/strong>\s*([^<]+)/)?.[1] || "N/A";
        const disk = html.match(/Disk Usage:<\/strong>\s*([^<]+)/)?.[1] || "N/A";
        const uptime = html.match(/Uptime:<\/strong>\s*([^<]+)/)?.[1] || "N/A";

        viewDiv.innerHTML = `
          <div class="results-title">System Info</div>
          <div class="info-card">
            <p><strong>CPU Usage:</strong> ${cpu}</p>
            <p><strong>RAM Usage:</strong> ${ram}</p>
            <p><strong>Disk Usage:</strong> ${disk}</p>
            <p><strong>Uptime:</strong> ${uptime}</p>
          </div>
        `;
      } catch {
        viewDiv.innerHTML = `<div class="results-title">System Info</div><div>Failed to load.</div>`;
      }
    }

    async function renderSearch(query) {
      showDiv();
      viewDiv.innerHTML = `<div class="results-title">Search results for: ${query}</div><div>Loading…</div>`;
      // you can later switch this to use /api/search if you want
    }

    function loadPage() {
      let value = urlEl.value.trim();
      if (!value) return;

      if (!value.startsWith("http://") && !value.startsWith("https://")) {
        const searchUrl = "https://www.bing.com/?q=" + encodeURIComponent(value);

        if (!activeTab) newTab();

        const tab = tabs.find(t => t.id === activeTab);
        tab.mode = "external";
        tab.url = searchUrl;

        const tabBtn = document.querySelector(`.tab[data-id="${activeTab}"] span:first-child`);
        tabBtn.textContent = value;

        showFrame(searchUrl);
        return;
      }

      if (!activeTab) newTab();

      const tab = tabs.find(t => t.id === activeTab);
      tab.mode = "external";
      tab.url = value;

      const tabBtn = document.querySelector(`.tab[data-id="${activeTab}"] span:first-child`);
      tabBtn.textContent = value.replace(/^https?:\/\//, "");

      showFrame(value);
    }

    urlEl.addEventListener("keydown", e => {
      if (e.key === "Enter") loadPage();
    });

    async function saveNote() {
      const text = prompt("Note:");
      if (!text) return;

      const res = await fetch(`${API_BASE}/api/note`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      alert("Saved note: " + data.file);
    }

    newTab();
  </script>
</body>
</html>
